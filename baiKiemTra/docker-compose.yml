services:
  db:
    build: ./database
    container_name: devops-db
    environment:
      MYSQL_ROOT_PASSWORD: Phamnguyennhuquynh15@
      MYSQL_DATABASE: devops_mini_project_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devops-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: Phamnguyennhuquynh15@
      DB_NAME: devops_mini_project_db
      APP_NAME: DevOps API
      STUDENT_NAME: Pham Nguyen Nhu Quynh
      STUDENT_ID: 2251220133
      STUDENT_CLASS: 22CT1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: npm start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: devops-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html

volumes:
  mysql_data:
